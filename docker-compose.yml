version: '3.9'
services:
  backend:
    build:
      context: ./backend
    ports:
      - 8080:8080
    environment:
      - SPRING_PROFILES_ACTIVE=default
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - 3000:80
    depends_on:
      - backend
    restart: unless-stopped
