version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pokerclock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - 8080:8080
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=pokerclock
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - APP_SEED_ADMIN_USERNAME=${APP_SEED_ADMIN_USERNAME:-}
      - APP_SEED_ADMIN_PASSWORD=${APP_SEED_ADMIN_PASSWORD:-}
      - APP_SEED_ADMIN_ROLE=${APP_SEED_ADMIN_ROLE:-ADMIN}
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - 3000:80
    depends_on:
      - backend
    restart: unless-stopped
volumes:
  db_data:
